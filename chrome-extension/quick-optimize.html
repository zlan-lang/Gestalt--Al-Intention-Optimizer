<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestalt - 快速优化</title>
  <link rel="stylesheet" href="quick-optimize.css">
</head>
<body>
  <div class="quick-optimize-panel">
    <!-- 头部 - 极简 -->
    <div class="qo-header">
      <div class="qo-logo">
        <span class="qo-icon">✨</span>
        <span class="qo-title">Gestalt</span>
      </div>
      <button class="qo-close" id="closeBtn" title="关闭">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- 核心内容区 -->
    <div class="qo-content">
      <!-- 输入区域 -->
      <div class="qo-input-section" id="inputSection">
        <div class="qo-input-label">
          <span class="label-text">输入你的想法</span>
          <span class="label-hint">Gestalt 会帮你优化成专业提示词</span>
        </div>
        <textarea
          id="userInput"
          class="qo-textarea"
          placeholder="例如：帮我写一个产品需求文档..."
          rows="4"
        ></textarea>
        <div class="qo-input-footer">
          <span class="char-count" id="charCount">0 字符</span>
          <button class="text-btn" id="pasteBtn" title="粘贴">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
            粘贴
          </button>
        </div>
      </div>

      <!-- 优化中状态 -->
      <div class="qo-optimizing" id="optimizingSection" style="display: none;">
        <div class="optimizing-animation">
          <div class="spinner"></div>
          <span class="optimizing-text">正在优化你的提示词...</span>
        </div>
        <div class="optimizing-tips">
          <span class="tip">💡 提示：详细的描述会获得更好的结果</span>
        </div>
      </div>

      <!-- 优化结果 -->
      <div class="qo-result-section" id="resultSection" style="display: none;">
        <div class="result-header">
          <span class="result-title">✨ 优化后的提示词</span>
          <div class="result-actions">
            <button class="icon-btn" id="copyBtn" title="复制">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="result-content" id="optimizedPrompt"></div>
        <div class="result-footer">
          <button class="secondary-btn" id="editBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            编辑
          </button>
          <button class="primary-btn" id="insertBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 10 4 15 9 20"></polyline>
              <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
            </svg>
            插入到 AI 对话
          </button>
        </div>
      </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="qo-footer" id="footerSection">
      <button class="primary-btn large" id="optimizeBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        开始优化
      </button>
      <button class="text-btn" id="advancedBtn">
        高级选项
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
    </div>

    <!-- 高级选项（默认隐藏） -->
    <div class="qo-advanced" id="advancedSection" style="display: none;">
      <div class="advanced-grid">
        <div class="advanced-item">
          <label class="advanced-label">任务类型</label>
          <select class="advanced-select" id="taskType">
            <option value="auto">🤖 自动识别</option>
            <option value="text">📝 文本生成</option>
            <option value="code">💻 代码相关</option>
            <option value="analysis">🔍 分析总结</option>
            <option value="creative">🎨 创意写作</option>
          </select>
        </div>
        <div class="advanced-item">
          <label class="advanced-label">优化强度</label>
          <select class="advanced-select" id="intensity">
            <option value="light">🌱 轻度优化</option>
            <option value="medium" selected>🌿 中度优化</option>
            <option value="strong">🌳 深度优化</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="quick-optimize.js"></script>
</body>
</html>
