<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>欢迎使用 Gestalt</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #64748b;
      font-size: 16px;
      margin-bottom: 32px;
    }
    .features {
      text-align: left;
      margin-bottom: 32px;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .feature:last-child {
      border-bottom: none;
    }
    .feature-icon {
      font-size: 24px;
    }
    .feature-text h3 {
      font-size: 14px;
      color: #334155;
      margin-bottom: 2px;
    }
    .feature-text p {
      font-size: 12px;
      color: #94a3b8;
    }
    .steps {
      text-align: left;
      background: #f8fafc;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 32px;
    }
    .steps h3 {
      font-size: 14px;
      color: #475569;
      margin-bottom: 12px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      font-size: 13px;
      color: #64748b;
    }
    .step-num {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✨</div>
    <h1>欢迎使用 Gestalt</h1>
    <p class="subtitle">AI 提示词编译器 - Chrome 插件版</p>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">🎯</span>
        <div class="feature-text">
          <h3>智能提示词优化</h3>
          <p>将模糊需求转化为专业提示词</p>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">🧠</span>
        <div class="feature-text">
          <h3>多推理模式</h3>
          <p>直觉式 / 思维链 / 思维树</p>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <div class="feature-text">
          <h3>多平台支持</h3>
          <p>Gemini / ChatGPT / Claude</p>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">📝</span>
        <div class="feature-text">
          <h3>一键插入</h3>
          <p>优化后的提示词直接插入对话</p>
        </div>
      </div>
    </div>

    <div class="steps">
      <h3>使用方法</h3>
      <div class="step">
        <span class="step-num">1</span>
        <span>打开 AI 对话页面 (Gemini/ChatGPT/Claude)</span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span>点击浏览器右上角的插件图标</span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span>在侧边栏中描述你的需求</span>
      </div>
      <div class="step">
        <span class="step-num">4</span>
        <span>点击「插入」将优化后的提示词添加到对话</span>
      </div>
    </div>

    <a href="#" class="btn" onclick="window.close()">开始使用</a>
  </div>
</body>
</html>
